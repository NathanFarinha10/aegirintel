<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aegir·Intel — Market Intelligence</title>

<!-- CSS first -->
<link rel="stylesheet" href="css/styles.css">

<!-- Fonts: non-render-blocking -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" onload="this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap"></noscript>

<!-- PDF.js: lazy -->
<script>
  window.loadPdfJs = async function() {
    if (window.pdfjsLib) return window.pdfjsLib;
    const pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs');
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.mjs';
    window.pdfjsLib = pdfjsLib;
    return pdfjsLib;
  };
</script>

<!-- SheetJS: async (not needed for boot) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" async></script>
</head>
<body class="grain">

<div class="app" id="app"></div>
<div id="print-report"></div>

<!-- App modules -->
<script src="js/core.js"></script>
<script src="js/intelligence.js"></script>
<script src="js/securities.js"></script>
<script src="js/macro.js"></script>
<script src="js/assetmgmt.js"></script>

<!-- Boot -->
<script>
try {
  (function() {
    var now = new Date();
    var last = DB.lastVisit ? new Date(DB.lastVisit) : null;
    if (!last || (now - last) > 60 * 60 * 1000) touchLastVisit();
  })();
  window.state = state;
  window.render = render;
  render();
} catch(e) {
  document.getElementById('app').innerHTML = '<div style="padding:40px;font-family:monospace;color:#b83c3c"><h2>Erro ao iniciar</h2><pre style="white-space:pre-wrap">' + (e.stack||e.message||e) + '</pre><button onclick="location.reload()" style="margin-top:12px;padding:8px 16px;cursor:pointer">Recarregar</button></div>';
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && state && state.modal) {
    if (state.modal === 'upload' && typeof uploadState !== 'undefined' && uploadState.processing) return;
    if (state.modal === 'upload' && typeof resetUploadState === 'function') resetUploadState();
    if (typeof setModal === 'function') setModal(null);
  }
});
if (typeof DB !== 'undefined' && DB.settings && !DB.settings.gemini_api_key) {
  setTimeout(function() { if (!DB.settings.gemini_api_key && typeof setModal === 'function') setModal('settings'); }, 400);
}
window.addEventListener('storage', function() { if (typeof loadDB === 'function') { DB = loadDB(); render(); } });
</script>

</body>
</html>
