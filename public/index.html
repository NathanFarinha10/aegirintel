<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aegir·Intel — Asset Management</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" onload="this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap"></noscript>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" async></script>
</head>
<body class="grain">
<div class="app" id="app"></div>
<div id="print-report"></div>
<script src="js/app.js"></script>
<script>
try {
  touchLastVisit();
  render();
  // Sync from KV after first render (non-blocking)
  syncFromKV().then(function(ok) {
    if (ok) console.log('[Aegir] Sync OK — dados compartilhados carregados');
  });
} catch(e) {
  document.getElementById('app').innerHTML = '<div style="padding:40px;font-family:monospace;color:#b83c3c"><h2>Erro</h2><pre style="white-space:pre-wrap">' + (e.stack||e.message||e) + '</pre><button onclick="location.reload()" style="margin-top:12px;padding:8px 16px;cursor:pointer">Recarregar</button></div>';
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && state.modal) setModal(null);
});
if (!DB.settings?.gemini_api_key) {
  setTimeout(function() { if (!DB.settings?.gemini_api_key) setModal('settings'); }, 800);
}
// Auto-sync every 5 minutes
setInterval(function() { syncFromKV(); }, 5 * 60 * 1000);
</script>
</body>
</html>
