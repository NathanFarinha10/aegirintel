<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aegir·Intel — Market Intelligence</title>

<!-- PDF.js: carregado sob demanda quando necessário (não bloqueia boot) -->
<script>
  window.loadPdfJs = async function() {
    if (window.pdfjsLib) return window.pdfjsLib;
    const pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs');
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.mjs';
    window.pdfjsLib = pdfjsLib;
    return pdfjsLib;
  };
</script>

<!-- SheetJS para parse de Excel (FipeZap, Abrainc) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/styles.css">
</head>
<body class="grain">

<div class="app" id="app"></div>
<div id="print-report"></div>

<!-- App modules (load order matters) -->
<script src="js/core.js"></script>
<script src="js/intelligence.js"></script>
<script src="js/securities.js"></script>
<script src="js/macro.js"></script>
<script src="js/assetmgmt.js"></script>

<!-- Boot (runs after ALL modules loaded) -->
<script>
// Diagnostic: show loading state immediately
document.getElementById('app').innerHTML = '<div style="padding:40px;font-family:monospace;font-size:12px;color:#5a564e"><div style="font-size:18px;font-family:Fraunces,serif;margin-bottom:8px">Aegir·Intel</div>Inicializando módulos…</div>';

try {
  // Verify all required globals exist
  var missing = [];
  if (typeof h !== 'function') missing.push('h()');
  if (typeof render !== 'function') missing.push('render()');
  if (typeof state !== 'object') missing.push('state');
  if (typeof DB !== 'object') missing.push('DB');
  if (typeof NAV_SECTIONS !== 'object') missing.push('NAV_SECTIONS');
  if (typeof renderIntHub !== 'function') missing.push('renderIntHub');
  if (typeof renderMarketMonitor !== 'function') missing.push('renderMarketMonitor');
  if (typeof renderHeatmap !== 'function') missing.push('renderHeatmap');
  if (typeof formatBRL !== 'function') missing.push('formatBRL');

  if (missing.length > 0) {
    document.getElementById('app').innerHTML = '<div style="padding:40px;font-family:monospace;color:#b83c3c"><h2>Module Error</h2><p>Funções/variáveis ausentes: <strong>' + missing.join(', ') + '</strong></p><p>Isso indica que um ou mais arquivos JS não carregaram corretamente ou estão desatualizados.</p><p style="margin-top:16px">Tente: Ctrl+Shift+R (hard reload) ou limpe o cache do navegador.</p></div>';
    throw new Error('Missing globals: ' + missing.join(', '));
  }

  // Track last visit (once per hour)
  (function() {
    var now = new Date();
    var last = DB.lastVisit ? new Date(DB.lastVisit) : null;
    if (!last || (now - last) > 60 * 60 * 1000) touchLastVisit();
  })();

  // Expose for error boundary buttons
  window.state = state;
  window.render = render;

  // Go!
  console.log('[Aegir] Boot: calling render()...');
  render();
  console.log('[Aegir] Boot: render() completed');

} catch(bootErr) {
  document.getElementById('app').innerHTML = '<div style="padding:40px;font-family:monospace;color:#b83c3c"><h2>Boot Error</h2><pre style="white-space:pre-wrap;word-break:break-word;background:#f8f6f3;padding:16px;border:1px solid #b83c3c;margin-top:12px">' + (bootErr.stack || bootErr.message || String(bootErr)).replace(/</g,'&lt;') + '</pre><div style="margin-top:16px"><button onclick="location.reload()" style="padding:8px 16px;border:1px solid #b83c3c;color:#b83c3c;background:none;cursor:pointer;font-family:monospace">Recarregar</button></div></div>';
  console.error('BOOT ERROR:', bootErr);
}

// ESC closes modals
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && state.modal) {
    if (state.modal === 'upload' && uploadState.processing) return;
    if (state.modal === 'upload') resetUploadState();
    setModal(null);
  }
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
    e.preventDefault();
    setView('int_hub');
  }
});

// First run: prompt for Gemini API key
if (!DB.settings.gemini_api_key) {
  setTimeout(function() {
    if (!DB.settings.gemini_api_key) setModal('settings');
  }, 400);
}

// Sync DB across tabs
window.addEventListener('storage', function() {
  DB = loadDB();
  render();
});
</script>

</body>
</html>
