<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aegir·Intel — Market Intelligence</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" onload="this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..900&family=Geist:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap"></noscript>
<script>
  window.loadPdfJs = async function() {
    if (window.pdfjsLib) return window.pdfjsLib;
    const pdfjsLib = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs');
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.mjs';
    window.pdfjsLib = pdfjsLib;
    return pdfjsLib;
  };
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" async></script>
</head>
<body class="grain">
<div class="app" id="app">
  <div id="boot-status" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Geist',sans-serif;color:#9a958c;font-size:13px;gap:8px">
    <div>Carregando Aegir·Intel…</div>
    <div id="boot-log" style="font-size:10px;font-family:monospace;max-width:500px;text-align:left"></div>
  </div>
</div>
<div id="print-report"></div>
<script>
var _bl = document.getElementById('boot-log');
function bootLog(msg) { _bl.innerHTML += msg + '<br>'; console.log('[Boot] ' + msg); }

window.onerror = function(msg,src,line) { bootLog('⚠ ERROR: '+msg+' @'+(src||'').split('/').pop()+':'+line); };
window.addEventListener('unhandledrejection', function(e) { bootLog('⚠ PROMISE: '+(e.reason?.message||e.reason||'?')); });

(async function boot() {
  var files = ['js/core.js','js/intelligence.js','js/securities.js','js/macro.js','js/assetmgmt.js'];
  
  for (var i = 0; i < files.length; i++) {
    bootLog('↓ ' + files[i]);
    try {
      var resp = await fetch(files[i]);
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      var text = await resp.text();
      bootLog('  ' + text.length + ' chars OK');
      var s = document.createElement('script');
      s.textContent = text;
      document.head.appendChild(s);
      bootLog('  ✓ executado');
    } catch(e) {
      bootLog('  ✗ FALHOU: ' + e.message);
      return;
    }
    await new Promise(function(r){setTimeout(r,10)});
  }
  
  bootLog('--- Todos carregados ---');
  bootLog('render=' + typeof render + ', DB=' + typeof DB);
  
  try {
    var now = new Date();
    var last = DB.lastVisit ? new Date(DB.lastVisit) : null;
    if (!last || (now - last) > 60 * 60 * 1000) touchLastVisit();
    bootLog('touchLastVisit OK');
    
    window.state = state;
    window.render = render;
    bootLog('Chamando render()...');
    render();
    bootLog('render() OK — children=' + document.getElementById('app').children.length);
  } catch(e) {
    bootLog('✗ BOOT ERROR: ' + e.message);
    bootLog(e.stack ? e.stack.substring(0,300) : '');
    document.getElementById('app').innerHTML = '<div style="padding:40px;font-family:monospace;color:#b83c3c"><h2>Erro</h2><pre style="white-space:pre-wrap">' + (e.stack||e.message||e) + '</pre><button onclick="location.reload()" style="margin-top:12px;padding:8px 16px;cursor:pointer">Recarregar</button></div>';
    return;
  }
  
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && state && state.modal) {
      if (state.modal === 'upload' && typeof uploadState !== 'undefined' && uploadState.processing) return;
      if (state.modal === 'upload' && typeof resetUploadState === 'function') resetUploadState();
      if (typeof setModal === 'function') setModal(null);
    }
  });
  if (DB.settings && !DB.settings.gemini_api_key) {
    setTimeout(function() { if (!DB.settings.gemini_api_key) setModal('settings'); }, 400);
  }
  window.addEventListener('storage', function() { DB = loadDB(); render(); });
})().catch(function(e) {
  bootLog('✗ ASYNC ERROR: ' + (e.message || e));
  bootLog(e.stack ? e.stack.substring(0,300) : '');
});
</script>
</body>
</html>
