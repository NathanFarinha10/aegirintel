<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aegir — Final Diagnostic</title>
<link rel="stylesheet" href="css/styles.css">
<style>#diag{position:fixed;top:0;left:0;right:0;background:#1a1815;color:#d4a574;font:11px/1.6 monospace;padding:12px;z-index:99999;max-height:60vh;overflow:auto}#diag b{color:#7a9b5c}#diag .err{color:#b83c3c}</style>
</head>
<body class="grain">
<div id="diag"></div>
<div class="app" id="app"></div>
<div id="print-report"></div>
<script>
var D=document.getElementById('diag');
function L(m,err){D.innerHTML+=(err?'<span class="err">✗ ':'<b>✓ ')+m+(err?'</span>':'</b>')+'<br>';console.log((err?'✗ ':'✓ ')+m)}

L('Início do diagnóstico');
L('UserAgent: '+navigator.userAgent);
L('LocalStorage: '+(function(){try{localStorage.setItem('_t','1');localStorage.removeItem('_t');return'OK'}catch(e){return'BLOCKED: '+e.message}})());

// Load each file individually via fetch to catch exact errors
var files = ['js/core.js','js/intelligence.js','js/securities.js','js/macro.js','js/assetmgmt.js'];
var idx = 0;

async function loadNext() {
  if (idx >= files.length) {
    L('Todos os scripts carregados!');
    tryBoot();
    return;
  }
  var file = files[idx];
  L('Carregando ' + file + '...');
  try {
    var t0 = Date.now();
    var resp = await fetch(file);
    var text = await resp.text();
    L(file + ' baixado: ' + resp.status + ', ' + text.length + ' chars, ' + (Date.now()-t0) + 'ms');
    
    // Try to execute it
    try {
      var script = document.createElement('script');
      script.textContent = text;
      document.head.appendChild(script);
      L(file + ' executado OK');
    } catch(execErr) {
      L(file + ' ERRO DE EXECUÇÃO: ' + execErr.message, true);
      L('Stack: ' + (execErr.stack||'').substring(0,300), true);
    }
  } catch(fetchErr) {
    L(file + ' ERRO DE FETCH: ' + fetchErr.message, true);
  }
  idx++;
  // Small delay between scripts to let browser breathe
  setTimeout(loadNext, 50);
}

function tryBoot() {
  L('--- BOOT ---');
  L('typeof h=' + typeof h + ', typeof render=' + typeof render);
  L('typeof DB=' + typeof DB + ', typeof state=' + typeof state);
  L('typeof renderHeader=' + typeof renderHeader);
  L('typeof renderSidebar=' + typeof renderSidebar);
  L('typeof renderIntHub=' + typeof renderIntHub);
  L('typeof renderMarketMonitor=' + typeof renderMarketMonitor);
  L('typeof touchLastVisit=' + typeof touchLastVisit);
  
  if (typeof render !== 'function') {
    L('render não é function — impossível continuar', true);
    return;
  }
  
  try {
    L('DB = ' + JSON.stringify({r:DB.reports?.length,v:DB.views?.length,s:Object.keys(DB.settings||{})}));
  } catch(e) { L('DB stringify erro: '+e.message, true); }
  
  try {
    L('Chamando render()...');
    render();
    var app = document.getElementById('app');
    L('render() OK — app.children=' + app.children.length + ', innerHTML.length=' + app.innerHTML.length);
    
    if (app.children.length > 0) {
      for (var i=0; i<Math.min(app.children.length,3); i++) {
        var c=app.children[i];
        var cs=getComputedStyle(c);
        L('child['+i+']: <'+c.tagName+'.'+c.className+'> '+c.offsetWidth+'×'+c.offsetHeight+' opacity='+cs.opacity+' display='+cs.display);
      }
      L('SUCESSO! A app renderizou. Feche este painel para ver.');
      setTimeout(function(){D.style.maxHeight='30px';D.style.cursor='pointer';D.onclick=function(){D.remove()};D.innerHTML='<b>✓ App carregada — clique para fechar diagnóstico</b>';},2000);
    } else {
      L('app está vazio após render!', true);
    }
  } catch(e) {
    L('render() ERRO: ' + e.message, true);
    L('Stack: ' + (e.stack||'').substring(0,500), true);
  }
}

// Capture global errors
window.onerror = function(msg,src,line,col,err) {
  L('GLOBAL ERROR: '+msg+' @ '+(src||'').split('/').pop()+':'+line, true);
};
window.addEventListener('unhandledrejection',function(e){
  L('UNHANDLED PROMISE: '+(e.reason?.message||e.reason||'?'), true);
});

// Start loading
loadNext();
</script>
</body>
</html>
